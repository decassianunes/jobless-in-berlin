<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Jobless in Berlin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    :root {
      --black: #111111;
      --border: 1.8px solid #111111;
      --radius: 20px;
      --shadow: 3px 3px 0px #111111;
      --shadow-sm: 2px 2px 0px #111111;
    }
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Space Grotesk', sans-serif;
      background: #F5F0EB;
      height: 100dvh; width: 100vw; overflow: hidden;
    }

    /* ── MAP ── */
    #map { position: absolute; inset: 0; z-index: 0; }
    /* Hide Google Maps chrome we don't need */
    .gm-style-cc, .gm-style-cc + div { display: none !important; }
    .gm-bundled-control .gmnoprint { display: none; }
    #map a[href^="https://maps.google"] { display: none !important; }

    /* ── TOP BAR ── */
    #topbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 30;
      background: #F5F0EB;
      border-bottom: var(--border);
      padding: 14px 16px 12px;
      display: flex; align-items: center; gap: 10px;
    }
    #topbar h1 { font-size: 26px; font-weight: 800; color: var(--black); letter-spacing: -0.5px; line-height: 1.1; }
    #topbar p  { font-size: 11px; font-weight: 600; color: #999; margin-top: 2px; }

    .loader-ring {
      width: 28px; height: 28px; border-radius: 50%;
      border: 3px solid #ddd; border-top-color: var(--black);
      animation: spin 0.8s linear infinite; flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── CATEGORY TILES ── */
    #cats {
      position: fixed; top: 72px; left: 0; right: 0; z-index: 30;
      display: flex; gap: 6px; padding: 8px 16px;
      overflow-x: auto; background: #F5F0EB;
      border-bottom: var(--border);
    }
    #cats::-webkit-scrollbar { display: none; }

    .cat-tile {
      flex-shrink: 0;
      display: flex; align-items: center; gap: 5px;
      padding: 5px 10px;
      border: 1.5px solid #111111;
      border-radius: 99px;
      background: white;
      font-size: 11px; font-weight: 700; color: var(--black);
      cursor: pointer;
      box-shadow: 2px 2px 0px #111111;
      transition: transform 0.1s, box-shadow 0.1s;
      user-select: none;
    }
    .cat-tile:active { transform: translate(2px,2px); box-shadow: none; }
    .cat-tile.active { color: white; box-shadow: 2px 2px 0px #111111; }
    .cat-tile svg { width: 13px; height: 13px; flex-shrink: 0; }

    /* ── BOTTOM SHEET ── */
    #sheet {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 40;
      background: #F5F0EB;
      border-top: var(--border);
      border-radius: 24px 24px 0 0;
      display: flex; flex-direction: column;
      transition: transform 0.38s cubic-bezier(0.32,0.72,0,1);
      height: 320px; max-height: 42dvh;
    }
    #sheet.collapsed { transform: translateY(calc(100% - 148px)); }
    @media (min-width: 768px) {
      body.detail-open #sheet { transform: translateY(100%); opacity: 0; pointer-events: none; }
    }

    .handle-wrap { padding: 10px 0 0; cursor: pointer; }
    .handle { width: 40px; height: 4px; border-radius: 2px; background: var(--black); margin: 0 auto; }

    .sheet-header { padding: 10px 16px 2px; display: flex; align-items: center; justify-content: space-between; }
    .sheet-label { font-size: 11px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: .08em; }
    .sheet-count { font-size: 11px; font-weight: 700; color: #888; }

    /* ── CARDS ── */
    #cards {
      display: flex; gap: 12px;
      overflow-x: auto; padding: 10px 16px 24px;
      scroll-snap-type: x mandatory;
    }
    #cards::-webkit-scrollbar { display: none; }

    .place-card {
      scroll-snap-align: start; flex-shrink: 0;
      width: 172px; height: 220px;
      border: var(--border); border-radius: var(--radius);
      box-shadow: var(--shadow);
      cursor: pointer; overflow: hidden;
      transition: transform 0.18s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.18s ease;
      position: relative; background: #222;
    }
    .place-card:hover { transform: translate(-2px,-2px); box-shadow: 5px 5px 0 #111; }
    .place-card:hover .card-photo { transform: scale(1.05); }
    .place-card:active { transform: translate(3px,3px); box-shadow: 1px 1px 0 #111; }
    .place-card:active .card-photo { transform: scale(1); }

    .card-photo {
      position: absolute; inset: 0;
      width: 100%; height: 100%; object-fit: cover;
      display: block;
      transition: transform 0.4s cubic-bezier(0.25,0.46,0.45,0.94);
    }
    .card-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(0,0,0,0.35) 55%, rgba(0,0,0,0.68) 100%);
      border-radius: inherit;
    }
    /* shown behind the photo; visible when a place has no image */
    .card-fallback-icon {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .card-fallback-icon svg { width: 64px; height: 64px; opacity: 0.9; }
    .card-icon-blob {
      position: absolute; top: 10px; right: 10px;
      width: 38px; height: 38px; flex-shrink: 0;
      border: 1.8px solid rgba(255,255,255,0.6);
      display: flex; align-items: center; justify-content: center;
      z-index: 2;
    }
    .card-content {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 12px 12px 10px; z-index: 2;
    }
    .card-name   { font-size: 13px; font-weight: 800; color: #fff; line-height: 1.2; margin-bottom: 3px; }
    .card-stars  { font-size: 11px; font-weight: 700; color: #FFD600; margin-bottom: 2px; }
    .card-status { font-size: 10px; font-weight: 700; }
    .card-status.open   { color: #6EF5A8; }
    .card-status.closed { color: rgba(255,255,255,0.55); }

    /* ── DETAIL SHEET ── */
    #detail {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 80dvh; z-index: 50;
      background: #F5F0EB;
      border-radius: 24px 24px 0 0;
      transform: translateY(100%);
      transition: transform 0.38s cubic-bezier(0.32,0.72,0,1);
      display: flex; flex-direction: column; overflow: hidden;
    }
    #detail.open { transform: translateY(0); }

    @media (min-width: 768px) {
      #detail {
        top: 0; right: 0; bottom: 0; left: auto;
        width: 420px; height: 100%;
        border-radius: 24px 0 0 24px;
        transform: translateX(110%);
        box-shadow: -4px 0 40px rgba(0,0,0,0.12);
      }
      #detail.open { transform: translateX(0); }
    }

    .detail-hero {
      flex-shrink: 0; position: relative;
      display: flex; flex-direction: column; justify-content: flex-end;
      padding: 16px;
      border-bottom: var(--border);
      min-height: 200px;
    }
    .detail-hero-img {
      position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: block;
    }
    .detail-hero-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.5) 100%);
    }
    .detail-back {
      position: absolute; top: 14px; left: 14px; z-index: 2;
      width: 40px; height: 40px; border-radius: 12px;
      background: #F5F0EB; border: var(--border);
      box-shadow: var(--shadow-sm);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-weight: 800; font-size: 16px; color: var(--black);
    }
    .detail-type-badge {
      position: absolute; top: 14px; right: 14px; z-index: 2;
      display: inline-flex; align-items: center; gap: 5px;
      padding: 6px 12px; border-radius: 99px;
      border: var(--border); box-shadow: var(--shadow-sm);
      font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: .06em;
      color: var(--black);
      white-space: nowrap; line-height: 1;
    }
    .detail-type-badge svg { width: 14px; height: 14px; flex-shrink: 0; }

    .detail-body { flex: 1; overflow-y: auto; padding: 20px 18px 32px; }
    .detail-name { font-size: 26px; font-weight: 800; color: var(--black); letter-spacing: -0.5px; margin-bottom: 8px; }

    .detail-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .detail-stars { font-size: 14px; font-weight: 700; color: #E8930A; }
    .detail-rating { font-size: 13px; font-weight: 600; color: #666; }

    .status-pill {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 10px; border-radius: 99px; border: var(--border);
      font-size: 11px; font-weight: 800;
    }
    .status-pill.open  { background: #D4F5E2; color: #1A9E5C; }
    .status-pill.closed { background: #FFE0E0; color: #D63B3B; }
    .status-pill.unknown { background: #EEE; color: #888; }

    .detail-address {
      font-size: 13px; font-weight: 600; color: #666;
      margin-bottom: 16px; display: flex; gap: 6px; align-items: flex-start;
    }

    .hours-block {
      border: var(--border); border-radius: var(--radius);
      box-shadow: var(--shadow-sm); background: white;
      padding: 14px 16px; margin-bottom: 16px;
    }
    .hours-block-label { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: .08em; color: #888; margin-bottom: 8px; }
    .hours-line { font-size: 13px; font-weight: 600; color: var(--black); line-height: 1.7; }

    .detail-desc { font-size: 14px; font-weight: 500; color: #555; line-height: 1.65; margin-bottom: 24px; }

    .cta-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 15px; border-radius: var(--radius);
      border: var(--border); box-shadow: var(--shadow);
      font-size: 14px; font-weight: 800; cursor: pointer; text-decoration: none;
      transition: transform 0.1s, box-shadow 0.1s;
      margin-bottom: 12px;
    }
    .cta-btn:active { transform: translate(3px,3px); box-shadow: 1px 1px 0 #111; }
    .cta-btn.primary { background: var(--black); color: white; }
    .cta-btn.secondary { background: white; color: var(--black); }
    .cta-btn svg { width: 18px; height: 18px; flex-shrink: 0; }

    @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    .fade-up { animation: fadeUp 0.3s ease both; }
    @keyframes pulse { 0%{transform:scale(1);opacity:0.6} 70%{transform:scale(2.5);opacity:0} 100%{transform:scale(2.5);opacity:0} }
    /* gentle pop-in for map markers so they don't snap in */
    @keyframes markerPop { from { opacity:0; transform:scale(0.4); } to { opacity:1; transform:scale(1); } }
    .map-blob { animation: markerPop 0.32s cubic-bezier(0.34,1.56,0.64,1) both; }

    .reviews-label { font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:#888;margin-bottom:10px; }
    .review-card { border:var(--border);border-radius:16px;box-shadow:var(--shadow-sm);background:#fff;padding:12px 14px;margin-bottom:10px; }
    .review-top { display:flex;align-items:center;gap:10px;margin-bottom:6px; }
    .review-avatar { width:32px;height:32px;border-radius:50%;border:var(--border);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;flex-shrink:0; }
    .review-name { font-size:13px;font-weight:700;color:var(--black); }
    .review-stars { font-size:11px;color:#E8930A;font-weight:700; }
    .review-text { font-size:13px;color:#555;line-height:1.55;font-weight:500; }
  </style>
</head>
<body>

<div id="map"></div>

<div id="topbar">
  <div style="flex:1">
    <h1>Jobless in Berlin 🇩🇪</h1>
    <p>Places to go when you're trying to find yourself</p>
  </div>
  <div id="loader" class="loader-ring" style="display:none"></div>
</div>

<div id="cats">
  <button class="cat-tile active" data-cat="all" onclick="setFilter('all')" style="background:#111;color:#fff;">

  </button>
  <button class="cat-tile" data-cat="jobcenter" onclick="setFilter('jobcenter')" style="background:#E63946;color:#fff;">

    </svg>
    Job Centers
  </button>
  <button class="cat-tile" data-cat="mensa" onclick="setFilter('mensa')" style="background:#FF69B4;color:#fff;">

  <button class="cat-tile" data-cat="gym" onclick="setFilter('gym')" style="background:#14B8A6;color:#fff;">

      Open with Google Maps

  </div>
</div>

let map, GPlace;

// ── HELPERS ──
function hashStr(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) h = (Math.imul(31, h) + str.charCodeAt(i)) | 0;
  return Math.abs(h);
}

function starStr(n) { return '★'.repeat(Math.floor(n)) + (n % 1 >= 0.5 ? '½' : ''); }

function showLoader(v) { document.getElementById('loader').style.display = v ? 'block' : 'none'; }

// Distance in metres between two {lat,lng} points (haversine)
function distMeters(a, b) {
  const R = 6371000, toRad = d => d * Math.PI / 180;
  const dLat = toRad(b.lat - a.lat), dLng = toRad(b.lng - a.lng);
  const s = Math.sin(dLat/2)**2 + Math.cos(toRad(a.lat)) * Math.cos(toRad(b.lat)) * Math.sin(dLng/2)**2;
  return 2 * R * Math.asin(Math.sqrt(s));
}

// ── GOOGLE MAPS INIT ──
async function initMap() {
  const { Map } = await google.maps.importLibrary("maps");
  const { Place } = await google.maps.importLibrary("places");
  GPlace = Place;

  map = new Map(document.getElementById('map'), {
    center: ALEX,
    zoom: 13,
    disableDefaultUI: true,
    zoomControl: true,
    zoomControlOptions: { position: google.maps.ControlPosition.RIGHT_TOP },
    styles: [
      { elementType: 'geometry', stylers: [{ color: '#F0EBE3' }] },
      { elementType: 'labels.text.fill', stylers: [{ color: '#746855' }] },
      { elementType: 'labels.text.stroke', stylers: [{ color: '#F5F1EC' }] },
      { featureType: 'water', elementType: 'geometry', stylers: [{ color: '#BDD5E7' }] },
      { featureType: 'road', elementType: 'geometry', stylers: [{ color: '#FFFFFF' }] },
      { featureType: 'road', elementType: 'geometry.stroke', stylers: [{ color: '#E0D9D0' }] },
      { featureType: 'road.highway', elementType: 'geometry', stylers: [{ color: '#F8D398' }] },
      { featureType: 'poi.park', elementType: 'geometry', stylers: [{ color: '#C8DCBA' }] },
      { featureType: 'poi', elementType: 'labels', stylers: [{ visibility: 'off' }] },
      { featureType: 'transit', elementType: 'geometry', stylers: [{ color: '#E8E4E0' }] },
      { featureType: 'administrative', elementType: 'geometry.stroke', stylers: [{ color: '#C9B8A8' }] },
    ],
  });

  // Custom HTML marker class
  window.BlobMarker = class extends google.maps.OverlayView {
    constructor(position, html, onClick) {
      super();
      this.pos = new google.maps.LatLng(position.lat, position.lng);
      this.html = html;
      this.onClick = onClick;
      this.div = null;
      this.visible = true;   // remembered even if set before the div is drawn
    }
    onAdd() {
      this.div = document.createElement('div');
      this.div.style.cssText = 'position:absolute;cursor:pointer;';
      this.div.style.display = this.visible ? '' : 'none';   // honor filter set pre-draw
      this.div.innerHTML = this.html;
      if (this.onClick) this.div.addEventListener('click', this.onClick);
      this.getPanes().overlayMouseTarget.appendChild(this.div);
    }
    draw() {
      const pt = this.getProjection().fromLatLngToDivPixel(this.pos);
      if (pt && this.div) {
        this.div.style.left = (pt.x - 23) + 'px';
        this.div.style.top  = (pt.y - 23) + 'px';
      }
    }
    onRemove() {
      if (this.div?.parentNode) this.div.parentNode.removeChild(this.div);
      this.div = null;
    }
    setVisible(v) { this.visible = v; if (this.div) this.div.style.display = v ? '' : 'none'; }
  };

  // Re-search when the map settles after a pan/zoom, if moved far enough
  map.addListener('idle', () => {
    clearTimeout(idleTimer);
    idleTimer = setTimeout(maybeRefetch, 700);
  });

  useFallback();           // instant content
  await locateUser();      // center search on the user (waits up to 8s, else Alexanderplatz)
  fetchFromPlaces();       // live results around the user
}

// Reload places when the user has navigated far from the last search center
function maybeRefetch() {
  if (fetching || !lastSearchCenter) return;       // skip during a fetch or before first load
  const c = map.getCenter();
  if (!c) return;
  const center = { lat: c.lat(), lng: c.lng() };
  if (distMeters(center, lastSearchCenter) < 2500) return;  // not far enough to bother
  searchCenter = center;
  fetchFromPlaces();
}

// ── USER LOCATION ──
// Search is centered here; defaults to Alexanderplatz until geolocation resolves.
let userLoc = { lat: ALEX.lat, lng: ALEX.lng };

function locateUser() {
  return new Promise(resolve => {
    if (!navigator.geolocation) { resolve(); return; }
    navigator.geolocation.getCurrentPosition(pos => {
      const { latitude: lat, longitude: lng } = pos.coords;
      userLoc = { lat, lng };
      searchCenter = { lat, lng };
      const youEl = document.createElement('div');
      youEl.innerHTML = `
        <div style="position:relative;width:18px;height:18px;">
          <div style="position:absolute;inset:-8px;border-radius:50%;background:rgba(67,97,238,0.15);animation:pulse 2s ease-out infinite;"></div>
          <div style="width:18px;height:18px;border-radius:50%;background:#4361EE;border:3px solid #fff;box-shadow:0 0 0 4px rgba(67,97,238,0.3),2px 2px 0 #111;"></div>
        </div>`;
      const youMarker = new window.BlobMarker({ lat, lng }, youEl.innerHTML, null);
      youMarker.setMap(map);
      map.panTo({ lat, lng });
      resolve();
    }, () => resolve(), { enableHighAccuracy: true, timeout: 8000 });
  });
}

const SEARCH_CONFIGS = [
  { type: 'cafe',      includedTypes: ['cafe'] },
  { type: 'park',      includedTypes: ['park'] },
  { type: 'library',   includedTypes: ['library'] },
  { type: 'museum',    includedTypes: ['museum'] },
  { type: 'jobcenter', textQuery: 'Jobcenter Berlin' },
  { type: 'mensa',     textQuery: 'Mensa Berlin' },
  { type: 'gym',       includedTypes: ['gym', 'fitness_center'] },
  { type: 'pool',      includedTypes: ['swimming_pool'] },
  { type: 'pool',      textQuery: 'Badesee Berlin' },
];

const PLACE_FIELDS = ['displayName','location','rating','photos',
                      'regularOpeningHours','formattedAddress',
                      'userRatingCount','id'];

async function searchCategory(cfg) {
  try {
    let places;
    const center = new google.maps.LatLng(searchCenter.lat, searchCenter.lng);
    if (cfg.includedTypes) {
      const r = await GPlace.searchNearby({
        fields: PLACE_FIELDS,
        locationRestriction: { center, radius: RADIUS },
        includedTypes: cfg.includedTypes,
        maxResultCount: 20,
        rankPreference: google.maps.places.SearchNearbyRankPreference.DISTANCE,
        language: 'en-US', region: 'DE',
      });
      places = r.places;
    } else {
      const r = await GPlace.searchByText({
        fields: PLACE_FIELDS,
        textQuery: cfg.textQuery,
        locationBias: { center, radius: RADIUS },
        maxResultCount: 20,
        language: 'en-US', region: 'DE',
      });
      places = r.places;
    }
    return (places || []).map(p => convertPlace(p, cfg.type));
  } catch(e) { console.error('Places search failed for', cfg.type, ':', e?.message || e); return []; }
}

function convertPlace(place, type) {
  const lat = place.location.lat();
  const lng = place.location.lng();
  const photo = place.photos?.[0]?.getURI?.({ maxWidth: 800 }) || place.photos?.[0]?.getUrl?.({ maxWidth: 800 }) || null;
  const hash  = hashStr(place.id);
  const isOpen = typeof place.regularOpeningHours?.isOpen === 'function' ? place.regularOpeningHours.isOpen() : null;
  const hours = place.regularOpeningHours?.weekdayDescriptions || [];
  return {
    id: place.id, placeId: place.id,
    type, name: place.displayName,
    lat, lng,
    color: CAT_COLOR[type],
    desc: DESCS[type][hash % DESCS[type].length],
    stars: place.rating || parseFloat((4.3 + Math.random() * 0.6).toFixed(1)),
    ratingCount: place.userRatingCount || Math.floor(Math.random() * 800 + 80),
    photo,
    hoursObj: isOpen !== null ? { isOpen, lines: hours } : null,
    address: place.formattedAddress || 'Berlin, Germany',
    reviews: [],
    detailLoaded: false,
    gmUrl: place.googleMapsURI || `https://www.google.com/maps/place/?q=place_id:${place.id}`,
  };
}

async function fetchFromPlaces() {
  fetching = true;
  showLoader(true);
  try {
    const accum = [], seen = new Set();
    let got = false;
    // Render markers progressively as each category resolves — feels alive
    await Promise.all(SEARCH_CONFIGS.map(async cfg => {
      const ps = await searchCategory(cfg);
      ps.forEach(p => { if (!seen.has(p.id)) { seen.add(p.id); accum.push(p); } });
      if (ps.length) {
        got = true;
        allPlaces = accum.slice();
        syncMarkers();
        applyMarkerVisibility(activeFilter);
      }
    }));
    if (got) buildCards(activeFilter);   // cards once, at the end (avoids flicker)
    lastSearchCenter = { ...searchCenter };
  } catch(e) { /* keep fallback */ }
  showLoader(false);
  fetching = false;
}

// ── MARKERS ──
function markerHTML(p) {
  const blob = BLOBS[hashStr(p.id) % BLOBS.length];
  const icon = TYPE_ICONS[p.type] || TYPE_ICONS.cafe;
  return `<div class="map-blob" style="background:${p.color};width:46px;height:46px;${blob};border:2.5px solid #111;box-shadow:3px 3px 0 #111;display:flex;align-items:center;justify-content:center;">${icon}</div>`;
}

// Add/remove only what changed so existing pins stay put (no flash);
// new pins animate in via the .map-blob pop.
function syncMarkers() {
  const ids = new Set(allPlaces.map(p => p.id));
  Object.keys(customMarkers).forEach(id => {
    if (!ids.has(id)) { customMarkers[id].setMap(null); delete customMarkers[id]; }
  });
  allPlaces.forEach(p => {
    if (customMarkers[p.id]) return;
    const m = new window.BlobMarker({ lat: p.lat, lng: p.lng }, markerHTML(p), () => {
      scrollToCard(p.id);
      openDetail(p);
    });
    m.setMap(map);
    customMarkers[p.id] = m;
  });
}

// ── CARDS ──
function buildCards(filter) {
  const el = document.getElementById('cards');
  el.innerHTML = '';
  const list = filter === 'all' ? allPlaces : allPlaces.filter(p => p.type === filter);
  document.getElementById('place-count').textContent = `${list.length} places`;
  if (!list.length) { el.innerHTML = '<p style="padding:12px 4px;font-size:13px;color:#888;font-weight:600;">No places found</p>'; return; }

  list.forEach((p, i) => {
    const blob = BLOBS[hashStr(p.id) % BLOBS.length];
    const card = document.createElement('div');
    card.id = `card-${p.id}`;
    card.className = 'place-card fade-up';
    card.style.animationDelay = `${Math.min(i, 10) * 0.03}s`;

    const statusHTML = p.hoursObj
      ? `<span class="card-status ${p.hoursObj.isOpen ? 'open' : 'closed'}">${p.hoursObj.isOpen ? '● Open' : '● Closed'}</span>`
      : `<span class="card-status" style="color:rgba(255,255,255,0.5)">● N/A</span>`;

    const icon = TYPE_ICONS[p.type] || TYPE_ICONS.cafe;
    // No photo → show the category icon on the category color. If a photo fails
    // to load, onerror removes it and the icon underneath shows through.
    card.style.background = p.color;
    const imgTag = p.photo
      ? `<img class="card-photo" src="${p.photo}" alt="${p.name}" loading="lazy" onerror="this.remove()"/>`
      : '';
    const cornerBlob = p.photo
      ? `<div class="card-icon-blob" style="${blob};background:${p.color};">${icon}</div>`
      : '';

    card.innerHTML = `
      <div class="card-fallback-icon">${icon}</div>
      ${imgTag}
      <div class="card-overlay"></div>
      ${cornerBlob}
      <div class="card-content">
        <div class="card-name">${p.name}</div>
        <div class="card-stars">${starStr(p.stars)} ${p.stars}</div>
        ${statusHTML}
      </div>`;

    card.addEventListener('click', () => {
      map.panTo({ lat: p.lat, lng: p.lng });
      map.setZoom(16);
      openDetail(p);
    });
    el.appendChild(card);
  });
}

function scrollToCard(id) {
  const c = document.getElementById(`card-${id}`);
  if (c) c.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
}

// ── FILTER ──
function setFilter(cat) {
  activeFilter = cat;
  document.querySelectorAll('.cat-tile').forEach(btn => {
    const on = btn.dataset.cat === cat;
    btn.classList.toggle('active', on);
    const bg = cat === 'all' ? '#111' : (CAT_COLOR[cat] || '#111');
    btn.style.background = on ? bg : 'white';
    btn.style.color = on ? '#fff' : '#111';
  });

  applyMarkerVisibility(cat);
  buildCards(cat);

  const vis = cat === 'all' ? allPlaces : allPlaces.filter(p => p.type === cat);
  if (vis.length > 1) {
    const bounds = new google.maps.LatLngBounds();
    vis.forEach(p => bounds.extend({ lat: p.lat, lng: p.lng }));
    map.fitBounds(bounds, 80);
  }
}

function applyMarkerVisibility(cat) {
  Object.entries(customMarkers).forEach(([id, m]) => {
    const p = allPlaces.find(x => x.id === id);
    m.setVisible(!!p && (cat === 'all' || p.type === cat));
  });
}

document.getElementById('sheet-handle').addEventListener('click', () => {
  const s = document.getElementById('sheet');
  sheetOpen ? s.classList.add('collapsed') : s.classList.remove('collapsed');

});

// ── DETAIL ──
async function openDetail(p) {
  // Render basic info immediately
  const photoEl = document.getElementById('d-photo');
  photoEl.style.display = p.photo ? 'block' : 'none';   // no photo → show color hero
  if (p.photo) photoEl.src = p.photo;
  photoEl.alt = p.name;
  document.getElementById('d-hero').style.background = p.color;
  document.getElementById('d-name').textContent = p.name;
  document.getElementById('d-stars').textContent = starStr(p.stars);
  document.getElementById('d-rating').textContent = `${p.stars} · ${p.ratingCount} reviews`;
  document.getElementById('d-desc').textContent = p.desc;
  document.getElementById('d-address-text').textContent = p.address;
  document.getElementById('d-gmaps').href = p.gmUrl || '#';

  const badge = document.getElementById('d-typebadge');
  const iconForBadge = (TYPE_ICONS[p.type] || '').replace(/stroke="#fff"/g, 'stroke="currentColor"');
  badge.innerHTML = iconForBadge + `<span>${TYPE_LABELS[p.type] || p.type}</span>`;
  badge.style.background = '#fff';

  const statusEl = document.getElementById('d-status');
  if (p.hoursObj) {
    statusEl.textContent = p.hoursObj.isOpen ? '● Open now' : '● Closed';
    statusEl.className = `status-pill ${p.hoursObj.isOpen ? 'open' : 'closed'}`;
    renderHours(p.hoursObj.lines);
  } else {
    statusEl.textContent = 'Hours unknown';
    statusEl.className = 'status-pill unknown';
    document.getElementById('d-hours-block').style.display = 'none';
  }

  renderReviews(p.reviews);
  document.getElementById('detail').classList.add('open');
  document.body.classList.add('detail-open');

  // Fetch full details from Places API if not already loaded
  if (!p.detailLoaded && p.placeId && !p.placeId.startsWith('fb')) {
    try {
      const place = new GPlace({ id: p.placeId });
      await place.fetchFields({
        fields: ['displayName','rating','userRatingCount','photos','reviews',
                 'regularOpeningHours','formattedAddress','googleMapsURI'],
      });

      if (place.photos?.length > 0) {
        p.photo = place.photos[0].getURI({ maxWidth: 800 });
        photoEl.src = p.photo;
        photoEl.style.display = 'block';
      }
      if (place.googleMapsURI) {
        p.gmUrl = place.googleMapsURI;
        document.getElementById('d-gmaps').href = p.gmUrl;
      }
      if (place.formattedAddress) {
        p.address = place.formattedAddress;
        document.getElementById('d-address-text').textContent = p.address;
      }
      if (place.regularOpeningHours) {
        p.hoursObj = {
          isOpen: typeof place.regularOpeningHours.isOpen === 'function' ? place.regularOpeningHours.isOpen() : null,
          lines: place.regularOpeningHours.weekdayDescriptions || [],
        };
        statusEl.textContent = p.hoursObj.isOpen ? '● Open now' : '● Closed';
        statusEl.className = `status-pill ${p.hoursObj.isOpen ? 'open' : 'closed'}`;
        renderHours(p.hoursObj.lines);
      }
      if (place.reviews?.length > 0) {
        p.reviews = place.reviews.slice(0, 3).map(r => ({
          name: r.authorAttribution?.displayName || 'Anonymous',
          avatar: (r.authorAttribution?.displayName || 'A')[0],
          text: (typeof r.text === 'string' ? r.text : r.text?.text) || '',
          stars: r.rating,
        }));
        renderReviews(p.reviews);
      }
      if (place.rating) {
        p.stars = place.rating;
        p.ratingCount = place.userRatingCount || p.ratingCount;
        document.getElementById('d-stars').textContent = starStr(p.stars);
        document.getElementById('d-rating').textContent = `${p.stars} · ${p.ratingCount} reviews`;
      }
      p.detailLoaded = true;
    } catch(e) { console.error('Detail fetch failed for', p.name, ':', e?.message || e); }
  }
}

function renderHours(lines) {
  const block = document.getElementById('d-hours-block');
  if (!lines?.length) { block.style.display = 'none'; return; }
  block.style.display = 'block';
  const list = document.getElementById('d-hours-list');
  list.innerHTML = lines.map(l => `<div class="hours-line">${l}</div>`).join('');
  list.style.display = 'none';                                 // start collapsed
  document.getElementById('d-hours-chevron').style.transform = 'rotate(0deg)';
}

document.getElementById('d-hours-toggle').addEventListener('click', () => {
  const list = document.getElementById('d-hours-list');
  const chevron = document.getElementById('d-hours-chevron');
  const open = list.style.display !== 'none';
  list.style.display = open ? 'none' : 'block';
  chevron.style.transform = open ? 'rotate(0deg)' : 'rotate(180deg)';
});

function renderReviews(reviews) {
  const el = document.getElementById('d-reviews');
  if (!reviews?.length) { el.innerHTML = ''; return; }
  el.innerHTML = `<div class="reviews-label">What people say</div>` +
    reviews.map((r, i) => `
      <div class="review-card">
        <div class="review-top">
          <div class="review-avatar" style="background:${AVATAR_COLORS[i % AVATAR_COLORS.length]}">${r.avatar || r.name[0]}</div>
          <div>
            <div class="review-name">${r.name}</div>
            <div class="review-stars">${'★'.repeat(r.stars)}</div>
          </div>
        </div>
        <div class="review-text">"${r.text}"</div>
      </div>`).join('');
}

function closeDetail() {
  document.getElementById('detail').classList.remove('open');
  document.body.classList.remove('detail-open');
}

// ── RENDER ──
function renderAll() { syncMarkers(); applyMarkerVisibility(activeFilter); buildCards(activeFilter); }
</script>
